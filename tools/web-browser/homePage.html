<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidFox - Home</title>
    <link rel="stylesheet" href="homePage.css">
</head>
<body>
    <!-- Animated background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <div class="container">
        <h1>VoidFox</h1>
        <p>Experience the web at light speed</p>
        
        <div class="search-box">
            <input type="text" id="search" placeholder="Search with Google or enter address">
            <button onclick="search()">Go</button>
        </div>
    </div>

    <script>
        function search() {
            const query = document.getElementById('search').value.trim();
            if (!query) return;
            
            // Check if it's a URL (contains a dot and no spaces)
            if (query.includes('.') && !query.includes(' ')) {
                // Add protocol if missing
                if (!query.startsWith('http://') && !query.startsWith('https://')) {
                    window.location.href = 'http://' + query;
                } else {
                    window.location.href = query;
                }
            } else {
                // Search using Google
                window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
            }
        }

        // Handle Enter key
        document.getElementById('search').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        // Focus search box on load
        window.addEventListener('load', function() {
            document.getElementById('search').focus();
        });
    </script>
</body>
</html>
