<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidFox</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><polygon points=%2250,10 10,90 50,70 90,90%22 fill=%22%23333%22/></svg>">

    <link rel="stylesheet" href="homePage.css">
    <style>
        body { margin: 0; padding: 0; background: #0b0f14; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body>
    <!-- Debug indicator to show page loaded -->
    <div id="page-loaded" style="position: fixed; top: 5px; right: 5px; background: #00ff88; color: #000; padding: 5px 10px; font-size: 12px; border-radius: 3px; z-index: 10000;">VoidFox Loaded ✓</div>

    <input type="file" id="bg-upload" accept="image/*">
    <input type="file" id="avatar-upload" accept="image/*">

    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="user-avatar" id="profile-pic" title="Change Profile Picture"></div>
            <span>Personal Space</span>
        </div>

        <div class="sidebar-section">
            <div class="section-header">
                <span class="section-title">Pinned</span>
            </div>
            <a href="https://github.com" class="nav-item" target="_blank">
                <img src="https://www.google.com/s2/favicons?domain=github.com&sz=32" class="icon" alt="GitHub">
                <span class="tab-text">GitHub</span>
            </a>
            <a href="https://youtube.com" class="nav-item" target="_blank">
                <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=32" class="icon" alt="YouTube">
                <span class="tab-text">YouTube</span>
            </a>
            <a href="https://linkedin.com" class="nav-item" target="_blank">
                <img src="https://www.google.com/s2/favicons?domain=linkedin.com&sz=32" class="icon" alt="LinkedIn">
                <span class="tab-text">LinkedIn</span>
            </a>
        </div>

        <div class="sidebar-section">
            <div class="section-header">
                <span class="section-title">Library</span>
            </div>
            <div class="nav-item" onclick="alert('Bookmarks panel would open here')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                <span class="tab-text">Bookmarks</span>
            </div>
            <div class="nav-item" onclick="alert('Downloads panel would open here')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                <span class="tab-text">Downloads</span>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="section-header">
                <span class="section-title">Today</span>
                <button class="add-tab-btn" onclick="addNewTab()" title="Add New Tab">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>

            <div id="today-tabs-container">
                <a href="https://example.com" target="_blank" class="nav-item" style="background: var(--hover-bg);">
                    <img src="https://www.google.com/s2/favicons?domain=example.com&sz=32" class="icon" alt="icon">
                    <span class="tab-text">Sample Tab</span>
                    <div class="dropdown">
                        <button class="tab-options-btn" onclick="toggleDropdown(event)">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                        </button>
                        <div class="dropdown-content">
                            <div class="dropdown-item" onclick="event.preventDefault(); alert('Pinned to top!')">Pin Tab</div>
                            <div class="dropdown-item" onclick="event.preventDefault(); alert('Added to Bookmarks!')">Add to Bookmarks</div>
                            <div class="dropdown-item" onclick="editTab(event)">Edit Tab</div>
                            <div class="dropdown-item" onclick="event.preventDefault(); this.closest('.nav-item').remove()">Close Tab</div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-footer">
            <div class="footer-icon" title="History">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
            <div class="footer-icon" title="Change Background Image" id="btn-settings">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </div>
        </div>
    </nav>

    <main class="main-window">
        <div class="center-brand">
            <div class="brand-logo-container">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 22 12 17 22 22 12 2"></polygon>
                </svg>
            </div>
            <h1>VoidFox</h1>
        </div>

        <div class="command-palette">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search" placeholder="Search Google or type a URL..." autocomplete="off">
        </div>
    </main>

    <script src="homePage.js"></script>
</body>
</html>
